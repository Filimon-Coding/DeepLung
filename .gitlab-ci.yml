stages:
  - test
  - train

variables:
  GIT_LFS_SKIP_SMUDGE: "1"

default:
  image: python:3.11-slim
  before_script:
    - python -V
    - pip install --upgrade pip
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip

smoke_test:
  stage: test
  tags:
    - xl-cloud-runner
  rules:
    - when: manual
      allow_failure: true
  script:
    - pip install numpy nibabel pydicom SimpleITK torchio torch torchvision
    - python -c "import torch; import torchio; import SimpleITK; import nibabel; import pydicom; print('Smoke test OK')"

train_gpu:
  stage: train
  rules:
    - when: manual
      allow_failure: true
  tags:
    - nvidia-a6000-2

  before_script:
    - python -V
    - pip install --upgrade pip
    - apt-get update
    - apt-get install -y --no-install-recommends git git-lfs
    - rm -rf /var/lib/apt/lists/*
    - git lfs pull

  script:
    - cd underDev2
    - pip install -r requirements.txt

    - echo "Listing underDev2 (top level):"
    - ls -lah . || true
    - echo "Listing Data (top level):"
    - ls -lah Data || true
    - echo "Disk usage for Data:"
    - du -sh Data || true

    - test -d Data || (echo "Missing underDev2/Data/ folder" && exit 1)
    - test -d Data/Train || (echo "Missing underDev2/Data/Train" && exit 1)
    - test -d Data/Test || (echo "Missing underDev2/Data/Test" && exit 1)

    - python Resnet_classifier_test.py

  artifacts:
    when: always
    paths:
      - underDev2/checkpoints/
      - checkpoints/
    expire_in: 14 days
