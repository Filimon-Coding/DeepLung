stages:
  - test
  - train

default:
  image: python:3.11-slim
  before_script:
    - python -V
    - pip install --upgrade pip
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip

smoke_test:
  stage: test
  tags:
    - xl-cloud-runner
  script:
    - pip install numpy nibabel pydicom SimpleITK torchio torch torchvision
    - python -c "import torch; import torchio; import SimpleITK; import nibabel; import pydicom; print('Smoke test OK')"

train_gpu:
  stage: train
  when: manual
  allow_failure: true
  tags:
    - nvidia-a6000-2
  script:
    - pip install -r requirements.txt
    # data ligger underDev2/Data (må ha Train/ og Test/)
    - test -d underDev2/Data || (echo 'Missing underDev2/Data/ folder' && exit 1)
    - test -d underDev2/Data/Train || (echo 'Missing underDev2/Data/Train' && exit 1)
    - test -d underDev2/Data/Test || (echo 'Missing underDev2/Data/Test' && exit 1)
    # kjør trening fra underDev2
    - python underDev2/Resnet_classifier_test.py
  artifacts:
    when: always
    paths:
      - underDev2/checkpoints/
      - checkpoints/
    expire_in: 14 days
