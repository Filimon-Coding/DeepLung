stages:
  - test
  - train

variables:
  GIT_LFS_SKIP_SMUDGE: "1"

default:
  image: python:3.11-slim
  before_script:
    - python -V
    - pip install --upgrade pip
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - /root/.cache/pip

smoke_test:
  stage: test
  tags:
    - xl-cloud-runner
  rules:
    - when: manual
      allow_failure: true
  script:
    - pip install numpy nibabel pydicom SimpleITK torchio torch torchvision
    - python -c "import torch; import torchio; import SimpleITK; import nibabel; import pydicom; print('Smoke test OK')"

train_gpu:
  stage: train
  timeout: 48 hours
  rules:
    - when: manual
      allow_failure: true
  tags:
    - nvidia-a6000

  before_script:
    - python -V
    - pip install --upgrade pip
    - apt-get update
    - apt-get install -y --no-install-recommends git git-lfs curl
    - rm -rf /var/lib/apt/lists/*
    - git fetch origin allDataUpload
    - git checkout origin/allDataUpload -- Data
    - git lfs pull --include="Data/**"
    - mv Data underdev3/Data

  script:
    - cd underdev3
    - pip install -r requirements.txt

    - echo "Listing underdev3 (top level):"
    - ls -lah . || true
    - echo "Listing Data (top level):"
    - ls -lah Data || true
    - echo "Disk usage for Data:"
    - du -sh Data || true

    - test -d Data || (echo "Missing underdev3/Data/ folder" && exit 1)
    - test -d Data/Train || (echo "Missing underdev3/Data/Train" && exit 1)
    - test -d Data/Test || (echo "Missing underdev3/Data/Test" && exit 1)

    - python -u Resnet_classifier_test.py

    # Deploy the trained model to the inference service so it is ready to use
    - mkdir -p ../backEnd/inferenceService/checkpoints
    - cp checkpoints/resnet3d_latest.pth ../backEnd/inferenceService/checkpoints/resnet3d_latest.pth
    - echo "Checkpoint deployed to inferenceService/checkpoints/"

  artifacts:
    when: always
    paths:
      - underdev3/checkpoints/
      - backEnd/inferenceService/checkpoints/resnet3d_latest.pth
    expire_in: 14 days

finetune_medicalnet:
  stage: train
  timeout: 48 hours
  rules:
    - when: manual
      allow_failure: true
  tags:
    - nvidia-a6000

  before_script:
    - python -V
    - pip install --upgrade pip
    - apt-get update
    - apt-get install -y --no-install-recommends git git-lfs curl
    - rm -rf /var/lib/apt/lists/*
    # Pull training data from allDataUpload branch
    - git fetch origin allDataUpload
    - git checkout origin/allDataUpload -- Data
    - git lfs pull --include="Data/**"
    - mv Data underdev4/Data
    # Pull MedicalNet backbone from LFS
    - git lfs pull --include="underdev4/checkpoints/resnet_18.pth"

  script:
    - cd underdev4
    - pip install -r requirements.txt

    - echo "Verifying data and backbone …"
    - test -d Data/Train || (echo "Missing underdev4/Data/Train" && exit 1)
    - test -d Data/Test  || (echo "Missing underdev4/Data/Test"  && exit 1)
    - test -f checkpoints/resnet_18.pth || (echo "Missing resnet_18.pth in checkpoints/" && exit 1)

    - echo "Disk usage:"
    - du -sh Data || true
    - du -sh checkpoints/resnet_18.pth || true

    - python -u finetune_medicalnet.py

  artifacts:
    when: always
    paths:
      - underdev4/checkpoints/
    expire_in: 14 days

